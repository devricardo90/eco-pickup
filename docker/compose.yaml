services:
  postgres:
    image: postgres:16.13
    container_name: ecopickup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ECOPICKUP_POSTGRES_DB:-ecopickup_dev}
      POSTGRES_USER: ${ECOPICKUP_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ECOPICKUP_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${ECOPICKUP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ecopickup-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ECOPICKUP_POSTGRES_USER:-postgres} -d ${ECOPICKUP_POSTGRES_DB:-ecopickup_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:latest
    container_name: ecopickup-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${ECOPICKUP_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ECOPICKUP_MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${ECOPICKUP_MINIO_API_PORT:-9000}:9000"
      - "${ECOPICKUP_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ecopickup-minio-data:/data

volumes:
  ecopickup-postgres-data:
  ecopickup-minio-data:
