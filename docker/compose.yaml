services:
  postgres:
    image: postgres:16.13
    container_name: ecopickup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ECOPICKUP_POSTGRES_DB:-ecopickup_dev}
      POSTGRES_USER: ${ECOPICKUP_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ECOPICKUP_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${ECOPICKUP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ecopickup-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ECOPICKUP_POSTGRES_USER:-postgres} -d ${ECOPICKUP_POSTGRES_DB:-ecopickup_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecopickup-postgres-data:
